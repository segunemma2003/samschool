name: Deploy Compasse
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 - Compasse
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 1200s
          script: |
            echo "Starting deployment process..."
            
            # Create emergency deployment script
            cat > ~/emergency-deploy.sh << 'EOL'
            #!/bin/bash
            set -e
            
            APP_DIR="/var/www/compasse"
            BACKUP_DIR="/var/www/compasse_backup_$(date +%Y%m%d%H%M%S)"
            REPO_URL="https://github.com/segunemma2003/samschool.git"
            BRANCH="main"
            
            echo "Starting emergency deployment script..."
            
            # 1. Create backup of existing site if needed
            if [ -d "$APP_DIR" ] && [ "$(ls -A $APP_DIR)" ]; then
              echo "Creating backup of existing installation..."
              # Just back up .env and storage, not the entire directory to save time
              if [ -f "$APP_DIR/.env" ]; then
                mkdir -p $BACKUP_DIR
                cp $APP_DIR/.env $BACKUP_DIR/.env
                echo "Backed up .env file"
              fi
              
              if [ -d "$APP_DIR/storage" ]; then
                mkdir -p $BACKUP_DIR/storage
                cp -r $APP_DIR/storage/app $BACKUP_DIR/storage/ 2>/dev/null || true
                echo "Backed up user uploads"
              fi
            fi
            
            # 2. Clone fresh copy to a temporary location
            echo "Cloning fresh repository..."
            TMP_DIR=$(mktemp -d)
            git clone --depth=1 -b $BRANCH $REPO_URL $TMP_DIR
            cd $TMP_DIR
            
            # 3. Prepare the application without using composer
            echo "Preparing application..."
            
            # Restore .env file if available
            if [ -f "$BACKUP_DIR/.env" ]; then
              cp $BACKUP_DIR/.env $TMP_DIR/.env
              # Fix AWS region
              grep -q "AWS_DEFAULT_REGION" .env || echo "AWS_DEFAULT_REGION=us-east-1" >> .env
              sed -i 's/FILESYSTEM_DISK=s3/FILESYSTEM_DISK=local/g' .env 2>/dev/null || true
            else
              # Create basic .env file if none exists
              cp .env.example .env 2>/dev/null || echo "No .env.example found"
              echo "APP_ENV=production" >> .env
              echo "APP_DEBUG=false" >> .env
              echo "APP_KEY=$(php -r 'echo "base64:".base64_encode(random_bytes(32));')" >> .env
              echo "AWS_DEFAULT_REGION=us-east-1" >> .env
              echo "FILESYSTEM_DISK=local" >> .env
            fi
            
            # 4. Install composer dependencies WITHOUT autoloader optimization
            echo "Installing composer dependencies without autoloader optimization..."
            
            # Check if composer is installed
            if ! command -v composer &> /dev/null; then
              echo "Installing composer..."
              curl -sS https://getcomposer.org/installer | sudo php -- --install-dir=/usr/local/bin --filename=composer
            fi
            
            # Install dependencies with minimal settings to avoid hanging
            COMPOSER_MEMORY_LIMIT=-1 composer install --no-interaction --no-dev --no-scripts --no-plugins --prefer-dist --no-autoloader
            
            # Generate autoloader without optimization (much faster but less efficient)
            COMPOSER_MEMORY_LIMIT=-1 composer dump-autoload --no-dev
            
            # 5. Prepare directory structure
            mkdir -p storage/app storage/framework/cache storage/framework/sessions storage/framework/views storage/logs
            mkdir -p bootstrap/cache
            
            # 6. Move application to final location
            echo "Moving application to final location..."
            sudo rm -rf $APP_DIR
            sudo mkdir -p $APP_DIR
            sudo cp -r * $APP_DIR/ 2>/dev/null || true
            sudo cp -r .env $APP_DIR/ 2>/dev/null || true
            sudo cp -r .git* $APP_DIR/ 2>/dev/null || true
            
            # 7. Restore storage directory if backup exists
            if [ -d "$BACKUP_DIR/storage/app" ]; then
              echo "Restoring user uploads..."
              sudo cp -r $BACKUP_DIR/storage/app/* $APP_DIR/storage/app/ 2>/dev/null || true
            fi
            
            # 8. Set permissions
            echo "Setting permissions..."
            sudo chown -R $USER:$USER $APP_DIR
            sudo chown -R www-data:www-data $APP_DIR/storage $APP_DIR/bootstrap/cache
            sudo chmod -R 775 $APP_DIR/storage $APP_DIR/bootstrap/cache
            
            # 9. Run minimal commands needed to get the site working
            cd $APP_DIR
            php artisan optimize:clear || echo "Optimize clear failed, continuing..."
            
            # Only run critical commands, skip the rest
            php artisan config:cache || echo "Config cache failed, continuing..."
            php artisan route:cache || echo "Route cache failed, continuing..."
            
            # 10. Restart services
            echo "Restarting services..."
            sudo supervisorctl reread
            sudo supervisorctl update
            sudo supervisorctl restart compasse-worker:* || echo "Supervisor restart failed, continuing..."
            sudo systemctl reload nginx || echo "Nginx reload failed, continuing..."
            
            echo "Emergency deployment completed!"
            EOL
            
            # Make script executable and run it
            chmod +x ~/emergency-deploy.sh
            echo "Running emergency deployment script..."
            ~/emergency-deploy.sh
