name: Deploy Compasse
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 - Compasse
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 1200s
          command_timeout: 40m  # Add command timeout
          script: |
            # Create deployment directory
            mkdir -p ~/deployment
            # Clone the repository to get the deployment scripts
            rm -rf ~/deployment/repo
            git clone --depth=1 https://github.com/segunemma2003/samschool.git ~/deployment/repo
            
            # Modify the deployment script to add timeout handling
            cat > ~/deployment/modified-deploy.sh << 'EOL'
            #!/bin/bash
            
            # Set error handling
            set -e
            
            # Define timeout function
            timeout_handler() {
              echo "Command taking too long, moving to next step"
              return 0
            }
            
            # Create directories with proper permissions
            sudo mkdir -p /var/www/compasse
            sudo chown -R $USER:$USER /var/www/compasse
            
            # Run the original deployment script with timeouts on critical commands
            cd ~/deployment/repo
            
            # Add AWS region to env if missing to fix S3 issues
            if [ -f "/var/www/compasse/.env" ]; then
              grep -q "AWS_DEFAULT_REGION" /var/www/compasse/.env || echo "AWS_DEFAULT_REGION=us-east-1" >> /var/www/compasse/.env
              grep -q "FILESYSTEM_DISK" /var/www/compasse/.env && sed -i 's/FILESYSTEM_DISK=s3/FILESYSTEM_DISK=local/g' /var/www/compasse/.env
            fi
            
            # Source the deployment script, but add timeout handling
            BRANCH="main"
            REPO_URL="https://github.com/segunemma2003/samschool.git"
            APP_DIR="/var/www/compasse"
            
            echo "Deploying Compasse from $BRANCH branch..."
            
            # Install required PHP extensions first
            echo "Installing required PHP extensions..."
            sudo apt update
            sudo apt install -y php8.3-intl
            
            # Handle git repository
            if [ -d "$APP_DIR/.git" ]; then
              echo "Git repository found. Pulling latest changes..."
              cd $APP_DIR
              git fetch --all
              git reset --hard origin/$BRANCH
            else
              if [ "$(ls -A $APP_DIR)" ]; then
                echo "Directory exists but is not a git repository. Backing up and cloning fresh..."
                BACKUP_DIR="/var/www/compasse_backup_$(date +%Y%m%d%H%M%S)"
                sudo mv $APP_DIR $BACKUP_DIR
                sudo mkdir -p $APP_DIR
                sudo chown -R $USER:$USER $APP_DIR
                git clone -b $BRANCH --depth=1 $REPO_URL $APP_DIR
                cd $APP_DIR
                if [ -f "$BACKUP_DIR/.env" ]; then
                  cp $BACKUP_DIR/.env $APP_DIR/.env
                  echo "Copied existing .env file from backup"
                  # Fix AWS config
                  grep -q "AWS_DEFAULT_REGION" .env || echo "AWS_DEFAULT_REGION=us-east-1" >> .env
                  sed -i 's/FILESYSTEM_DISK=s3/FILESYSTEM_DISK=local/g' .env
                fi
              else
                echo "Directory is empty. Cloning repository..."
                git clone -b $BRANCH --depth=1 $REPO_URL $APP_DIR
                cd $APP_DIR
              fi
            fi
            
            # Check for composer
            if ! command -v composer &> /dev/null; then
              echo "Installing composer..."
              curl -sS https://getcomposer.org/installer | sudo php -- --install-dir=/usr/local/bin --filename=composer
            fi
            
            # Install dependencies with timeout and fallback options
            echo "Installing Composer dependencies..."
            timeout 600 composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev --no-scripts || {
              echo "Composer install with timeout failed, trying alternative approach..."
              # If composer gets stuck, try running without autoloader optimization
              timeout 300 composer install --no-interaction --prefer-dist --no-dev --no-scripts --no-autoloader || {
                echo "Second composer install attempt failed."
                return 1
              }
              # Generate autoloader separately with a timeout
              echo "Generating autoloader..."
              timeout 300 composer dump-autoload --optimize || echo "Autoloader generation timed out, continuing..."
            }
            
            # Create storage directories
            mkdir -p $APP_DIR/storage/app $APP_DIR/storage/framework/cache $APP_DIR/storage/framework/sessions $APP_DIR/storage/framework/views $APP_DIR/storage/logs
            mkdir -p $APP_DIR/bootstrap/cache
            
            # Database migrations (with error handling)
            timeout 180 php artisan migrate --force || { echo "Migration failed, but continuing..."; }
            timeout 180 php artisan tenants:migrate --force || { echo "Tenant migration failed, but continuing..."; }
            
            # Clear previous caches first
            timeout 60 php artisan optimize:clear || { echo "Optimize clear failed, but continuing..."; }
            
            # Cache configurations
            timeout 60 php artisan config:cache || { echo "Config cache failed, but continuing..."; }
            timeout 60 php artisan route:cache || { echo "Route cache failed, but continuing..."; }
            timeout 60 php artisan view:cache || { echo "View cache failed, but continuing..."; }
            
            # Set permissions
            sudo chown -R www-data:www-data $APP_DIR/storage $APP_DIR/bootstrap/cache
            sudo chmod -R 775 $APP_DIR/storage $APP_DIR/bootstrap/cache
            
            # Restart supervisor (with error handling)
            echo "Restarting supervisor services..."
            sudo supervisorctl reread
            sudo supervisorctl update
            sudo supervisorctl restart compasse-worker:* || {
              echo "Supervisor restart failed, but continuing...";
            }
            
            # Reload Nginx (with error handling)
            sudo systemctl reload nginx || { echo "Nginx reload failed. Check the configuration."; }
            
            echo "Compasse deployment completed successfully!"
            EOL
            
            # Make the modified script executable and run it
            chmod +x ~/deployment/modified-deploy.sh
            ~/deployment/modified-deploy.sh
