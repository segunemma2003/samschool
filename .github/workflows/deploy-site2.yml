name: Deploy Northstar to Production

on:
  push:
    branches: [prod]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/prod'

    steps:
      - name: Deploy Northstar to Production Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }} # Same host as Compasse
          username: ${{ secrets.SSH_USER }} # Same user as Compasse
          key: ${{ secrets.SSH_PRIVATE_KEY }} # Same key as Compasse
          timeout: 600s
          script: |
            set -e

            echo "🚀 Starting Northstar production deployment..."
            echo "🌿 Branch: prod"
            echo "📁 Target: /var/www/northstar"

            # Navigate to Northstar application directory
            cd /var/www/northstar

            # Create quick backup
            BACKUP_DIR="/var/www/northstar_backup_$(date +%Y%m%d_%H%M%S)"
            echo "💾 Creating backup..."
            sudo cp -r /var/www/northstar $BACKUP_DIR
            echo "✅ Backup created: $BACKUP_DIR"

            # Put application in maintenance mode
            echo "🔧 Enabling maintenance mode..."
            php artisan down --retry=60 --refresh=15 --message="🚀 Deploying Northstar updates..." || echo "Could not enable maintenance mode"

            # Pull latest changes from prod branch
            echo "📥 Pulling latest changes from prod branch..."
            git fetch --all
            git reset --hard origin/prod
            git clean -fd
            echo "✅ Code updated successfully from prod branch"

            # Update Composer dependencies
            echo "📦 Updating dependencies..."
            composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev
            composer dump-autoload --optimize
            echo "✅ Dependencies updated"

            # Handle migration conflicts before running migrations
            echo "🔍 Checking for migration conflicts..."

            # Function to mark migration as complete if table exists
            mark_migration_if_table_exists() {
                local table_name=$1
                local migration_name=$2

                php -r "
                require 'vendor/autoload.php';
                \$app = require_once 'bootstrap/app.php';
                \$kernel = \$app->make(Illuminate\\Contracts\\Console\\Kernel::class);
                \$kernel->bootstrap();

                use Illuminate\\Support\\Facades\\Schema;
                use Illuminate\\Support\\Facades\\DB;

                if (Schema::hasTable('$table_name')) {
                    \$migrationExists = DB::table('migrations')
                        ->where('migration', '$migration_name')
                        ->exists();

                    if (!\$migrationExists) {
                        DB::table('migrations')->insertOrIgnore([
                            'migration' => '$migration_name',
                            'batch' => DB::table('migrations')->max('batch') + 1
                        ]);
                        echo 'Migration $migration_name marked as complete';
                    }
                }
                " || echo "Could not check migration for $table_name"
            }

            # Add known problematic migrations (same as Compasse)
            mark_migration_if_table_exists "hostel_house_masters" "2025_04_26_020335_create_hostel_house_masters_table"

            # Run database migrations with better error handling
            echo "🔄 Running database migrations..."
            if ! php artisan migrate --force; then
              echo "⚠️ Some migrations failed, but continuing deployment..."
              echo "📋 Migration status:"
              php artisan migrate:status
            else
              echo "✅ Migrations completed successfully"
            fi

            # Run tenant migrations if available
            echo "🔄 Checking for tenant migrations..."
            if php artisan list | grep -q "tenants:migrate"; then
              echo "🔄 Running tenant migrations..."
              if ! php artisan tenants:migrate --force; then
                echo "⚠️ Tenant migration failed, continuing with deployment..."
              else
                echo "✅ Tenant migrations completed"
              fi
            else
              echo "ℹ️ No tenant migrations found"
            fi

            # Clear and cache configurations (SKIP ROUTE CACHING to avoid conflicts)
            echo "🧹 Clearing and caching configurations..."
            php artisan optimize:clear
            php artisan config:cache
            # Skip route caching to avoid route conflicts
            # php artisan route:cache
            php artisan view:cache
            echo "✅ Configurations cached (routes skipped for stability)"

            # Restart queue workers
            echo "🔄 Restarting queue workers..."
            php artisan queue:restart
            if sudo supervisorctl status 2>/dev/null | grep -q "northstar-worker"; then
              sudo supervisorctl restart northstar-worker:* || echo "Could not restart northstar workers"
              echo "✅ Northstar workers restarted"
            else
              echo "ℹ️ No supervisor workers found for northstar"
            fi

            # Restart PHP-FPM
            echo "🔄 Restarting PHP-FPM..."
            sudo systemctl reload php8.4-fpm || echo "Could not reload PHP-FPM"
            echo "✅ PHP-FPM reloaded"

            # Clear any compiled views/cache that might cause issues
            echo "🧹 Clearing additional caches..."
            php artisan cache:clear || echo "Could not clear application cache"
            php artisan event:clear || echo "Could not clear events"
            echo "✅ Additional caches cleared"

            # Take application out of maintenance mode
            echo "🟢 Disabling maintenance mode..."
            php artisan up
            echo "✅ Northstar is now live on production"

            # Clean up old backups (keep last 5)
            echo "🧹 Cleaning up old backups..."
            ls -td /var/www/northstar_backup_* 2>/dev/null | tail -n +6 | xargs -r rm -rf || echo "No old backups to clean"
            echo "✅ Old backups cleaned"

            # Production health check
            echo "🔍 Running production health check..."
            if curl -f -s http://localhost >/dev/null 2>&1; then
              echo "✅ Server is responding"
            else
              echo "⚠️ Health check failed - please verify manually"
            fi

            # Show deployment summary
            echo ""
            echo "🎉 Northstar production deployment completed successfully!"
            echo "=========================================================="
            echo "📊 Summary:"
            echo "  ✅ Code pulled from PROD branch"
            echo "  ✅ Dependencies updated"
            echo "  ✅ Database migrations handled"
            echo "  ✅ Configurations cached"
            echo "  ✅ Queue workers restarted"
            echo "  ✅ Application is live on production"
            echo ""
            echo "📁 Location: /var/www/northstar"
            echo "🌿 Branch: prod"
            echo "📊 Commit: $(git rev-parse --short HEAD)"
            echo "⏰ Deployed: $(date)"
            echo ""
            echo "🔗 Visit your production site to verify the update!"

      - name: Rollback on Failure
        if: failure()
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 300s
          script: |
            echo "❌ Northstar production deployment failed! Starting automatic rollback..."

            # Navigate to the correct directory first
            cd /var/www/northstar || cd /var/www/ || echo "Could not navigate to project directory"

            # Find the latest backup
            LATEST_BACKUP=$(ls -td /var/www/northstar_backup_* 2>/dev/null | head -n1)

            if [ -n "$LATEST_BACKUP" ] && [ -d "$LATEST_BACKUP" ]; then
              echo "📦 Rolling back to: $LATEST_BACKUP"

              # Stop queue workers safely
              if command -v supervisorctl >/dev/null 2>&1; then
                if sudo supervisorctl status 2>/dev/null | grep -q "northstar-worker"; then
                  sudo supervisorctl stop northstar-worker:* || true
                fi
              fi

              # Restore from backup (more safely)
              if [ -d "/var/www/northstar" ]; then
                sudo rm -rf /var/www/northstar || echo "Could not remove current directory"
              fi

              sudo cp -r "$LATEST_BACKUP" /var/www/northstar || echo "Could not restore backup"

              # Fix permissions
              sudo chown -R www-data:www-data /var/www/northstar/storage /var/www/northstar/bootstrap/cache 2>/dev/null || true
              sudo chown -R $USER:$USER /var/www/northstar 2>/dev/null || true

              # Restart services safely
              cd /var/www/northstar || echo "Could not navigate to restored directory"

              # Bring app back up
              if [ -f "artisan" ]; then
                php artisan up || true

                # Restart workers if they exist
                if command -v supervisorctl >/dev/null 2>&1; then
                  if sudo supervisorctl status 2>/dev/null | grep -q "northstar-worker"; then
                    sudo supervisorctl start northstar-worker:* || true
                  fi
                fi

                # Restart PHP-FPM
                sudo systemctl reload php8.4-fpm 2>/dev/null || true
              fi

              echo "✅ Automatic rollback completed!"
              echo "🔗 Previous version of Northstar should now be restored"
            else
              echo "❌ No backup found for rollback!"
              echo "🚨 Manual intervention required for Northstar production"

              # At least try to bring the app back up
              cd /var/www/northstar 2>/dev/null || true
              if [ -f "artisan" ]; then
                php artisan up || true
              fi
            fi

      - name: Notify Success
        if: success()
        run: |
          echo "✅ Northstar production deployment successful!"
          echo "🚀 Northstar is now running the latest code on production"
          echo "📅 Deployed at: $(date)"
          echo "📊 Commit: ${{ github.sha }}"
          echo "🌿 Branch: prod"
          echo "🌟 Environment: PRODUCTION"

      - name: Notify Failure
        if: failure()
        run: |
          echo "❌ Northstar production deployment failed!"
          echo "🔄 Automatic rollback attempted"
          echo "📅 Failed at: $(date)"
          echo "📊 Commit: ${{ github.sha }}"
          echo "🌿 Branch: prod"
          echo "🌟 Environment: PRODUCTION"
          echo "🚨 URGENT: Please check production server manually"
